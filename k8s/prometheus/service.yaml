apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: monitoring-system
spec:
  # Headless: pairs with the StatefulSet's serviceName and gives Grafana a
  # stable DNS name (prometheus.monitoring.svc.cluster.local) for its
  # datasource, without needing a virtual ClusterIP for a single replica.
  clusterIP: None
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
