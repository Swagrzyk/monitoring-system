apiVersion: apps/v1
kind: Deployment
metadata:
  name: exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: exporter
    app.kubernetes.io/part-of: monitoring-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exporter
        app.kubernetes.io/part-of: monitoring-system
    spec:
      containers:
        - name: exporter
          image: monitoring-exporter:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8000
          # The exporter has no external dependencies, so the same /metrics
          # endpoint is a valid signal for both readiness and liveness.
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
