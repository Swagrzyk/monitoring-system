apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring-system
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
        jsonData:
          # Lets Grafana list/display this Prometheus's own alerting rules
          # (Status > Alerting shows them as "data source-managed" rules)
          # instead of requiring alerts to be re-defined as Grafana-managed
          # rules. Prometheus evaluates them; Grafana just reads the state.
          manageAlerts: true
          prometheusType: Prometheus
          prometheusVersion: 2.55.1
