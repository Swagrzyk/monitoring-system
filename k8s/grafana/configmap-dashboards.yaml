apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring-system
data:
  slo-overview.json: |
    {
      "title": "Exporter SLO / Error Budget",
      "uid": "exporter-slo-overview",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "timezone": "browser",
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "tags": ["slo", "monitoring-system"],
      "panels": [
        {
          "id": 10,
          "type": "alertlist",
          "title": "Active Alerts",
          "description": "Live state of the SLO burn-rate alerts, evaluated by Prometheus and read by Grafana from the Prometheus datasource (jsonData.manageAlerts) - no separate Alertmanager needed just to see this.",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 6 },
          "options": {
            "dashboardAlerts": false,
            "groupBy": [],
            "groupMode": "default",
            "maxItems": 20,
            "sortOrder": 1,
            "stateFilter": {
              "error": true,
              "firing": true,
              "noData": false,
              "normal": true,
              "pending": true
            },
            "viewMode": "list"
          }
        },
        {
          "id": 1,
          "type": "stat",
          "title": "Availability (30d)",
          "description": "SLI: fraction of Prometheus scrapes against the exporter that succeeded, over a rolling 30-day window. SLO target: 99.5%.",
          "gridPos": { "x": 0, "y": 6, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "100 * (1 - slo:exporter_availability_errors:ratio_rate30d)", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 99 },
                  { "color": "green", "value": 99.5 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "graphMode": "area",
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "Error Budget Remaining (30d)",
          "description": "100% = no failed scrapes in the window at all. 0% = the 99.5% SLO's entire error budget has been consumed.",
          "gridPos": { "x": 8, "y": 6, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "100 * (1 - (slo:exporter_availability_errors:ratio_rate30d / 0.005))", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 20 },
                  { "color": "green", "value": 50 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Current Burn Rate (1h)",
          "description": "Multiple of the sustainable burn rate. 1x exactly consumes the 30-day budget on schedule; 14.4x exhausts it in about 2 days (see the ExporterAvailabilityBurnRateFast alert).",
          "gridPos": { "x": 16, "y": 6, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "slo:exporter_availability_errors:ratio_rate1h / 0.005", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "orange", "value": 6 },
                  { "color": "red", "value": 14.4 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "graphMode": "area",
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Error Budget Burn Rate (1h vs 6h windows)",
          "description": "Multi-window burn rate used by the alerting rules. Sustained crossings of the 14.4x / 6x lines are what page; see prometheus/slo_rules.yml.",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "slo:exporter_availability_errors:ratio_rate1h / 0.005", "legendFormat": "1h burn rate", "refId": "A" },
            { "expr": "slo:exporter_availability_errors:ratio_rate6h / 0.005", "legendFormat": "6h burn rate", "refId": "B" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 5,
                "thresholdsStyle": { "mode": "dashed" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "orange", "value": 6 },
                  { "color": "red", "value": 14.4 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Scrape Success (up)",
          "description": "Raw SLI signal: 1 = scrape succeeded, 0 = scrape failed.",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "up{job=\"python-monitor\"}", "legendFormat": "exporter up", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "min": 0,
              "max": 1,
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "stepMode": "after" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "Exporter Host Metrics",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 1 }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "CPU Usage",
          "gridPos": { "x": 0, "y": 23, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "system_cpu_percent", "legendFormat": "cpu %", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Memory Usage",
          "gridPos": { "x": 8, "y": 23, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "system_memory_percent", "legendFormat": "memory %", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Disk Usage",
          "gridPos": { "x": 16, "y": 23, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "system_disk_percent", "legendFormat": "{{mountpoint}}", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          }
        }
      ]
    }
