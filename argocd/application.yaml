apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-system
  namespace: argocd
  finalizers:
    # Ensures ArgoCD also deletes the deployed resources if this
    # Application is ever deleted (rather than orphaning them).
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Swagrzyk/monitoring-system.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true      # remove resources deleted from git
      selfHeal: true    # revert manual cluster drift back to git state
    syncOptions:
      - CreateNamespace=true
